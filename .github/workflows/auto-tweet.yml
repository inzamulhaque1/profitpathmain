name: Auto Tweet Notification

on:
  schedule:
    # 3 times daily (UTC times - Bangladesh is UTC+6)
    - cron: '0 3 * * *'   # 9:00 AM Bangladesh
    - cron: '0 7 * * *'   # 1:00 PM Bangladesh
    - cron: '0 12 * * *'  # 6:00 PM Bangladesh
  workflow_dispatch: # Manual trigger

jobs:
  send-tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send tweet notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot/telegram_notify.py
